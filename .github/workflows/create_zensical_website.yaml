# Adapted from https://zensical.org/docs/publish-your-site/#with-github-actions
name: Create Zensical website

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/create_zensical_website.yaml
      - 'docs/**'
      - zensical.toml

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  create_zensical_website:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean --strict
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
