# Create, build and deploy the website
name: Create website

on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies for local website deploy
        run: pip install -r requirements.txt

      - name: Install dependencies to create software table
        run: pip install natsort

      - name: Create software table
        run: python3 scripts/sw_table_md_creator.py -i https://export.uppmax.uu.se/staff/software_table_ci/software_table.json -o docs/software/software-table.md

      - name: Remove folders that need not to be checked
        run: |
          rm -rf docs/*/rackham/
          rm -rf docs/*/snowy/

      - name: Render HTML
        run: zensical build --clean

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment

